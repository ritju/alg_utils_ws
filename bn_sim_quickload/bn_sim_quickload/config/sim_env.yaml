# 仿真测试环境配置文件
# Simulation test environment configuration

# 环境变量设置
environment:
  CYCLONEDDS_URI: "file:///home/sherlock/codes/vision_ws/src/vehicle_tracker/config/dds.xml"

# 工作空间 source 路径
workspaces:
  ritju_ws: /home/sherlock/codes/ritju_ws/install/setup.bash
  utils_ws: /home/sherlock/codes/utils_ws/install/setup.bash
  nav2_ws: /home/sherlock/codes/nav2_ws/install/setup.bash

# Rosbag 回放配置
rosbag:
  # 默认 bag 文件路径
  # 一辆运动
  # default_bag_path: ~/data/rosbags/vision_lidar/rosbag2_2026_04_16-15_35_07
  # 单车道无运动
  # default_bag_path: ~/data/rosbags/imu_3d_lidar_full/mk30/bag_recordings/rosbag2_2026_04_27-15_07_27
  # 无车道两侧无运动
  # default_bag_path: ~/data/rosbags/imu_3d_lidar_full/mk30/bag_recordings/rosbag2_2026_04_27-15_10_04
  # 无车道两侧无运动2
  # default_bag_path: ~/data/rosbags/imu_3d_lidar_full/mk30/bag_recordings/rosbag2_2026_04_27-15_13_22
  # 连续多辆无运动
  # default_bag_path: ~/data/rosbags/imu_3d_lidar_full/mk30/bag_recordings/rosbag2_2026_04_27-15_17_46
  # 动态camera information
  # default_bag_path: ~/data/rosbags/imu_3d_lidar_full/mk37/bag_recordings/rosbag2_2026_05_09-15_55_23
  # 动静判断错误
  # default_bag_path: ~/data/rosbags/imu_3d_lidar_full/mk28/bag_recordings/recording_20260603_185157
  # 带车道信息动静判断错误1
  # default_bag_path: ~/data/rosbags/imu_3d_lidar_full/mk28/bag_recordings/recording_20260604_155339
  # 带车道信息动静判断错误2
  # default_bag_path: ~/data/rosbags/imu_3d_lidar_full/mk28/bag_recordings/recording_20260604_155923
  # 带车道信息运动车辆
  default_bag_path: ~/data/rosbags/imu_3d_lidar_full/mk29/bag_recordings/recording_20260605_171021
  # 带车道信息运动车辆
  #default_bag_path: ~/data/rosbags/imu_3d_lidar_full/mk29/bag_recordings/recording_20260605_171202
  # 带车道信息大数据量
  # default_bag_path: ~/data/rosbags/imu_3d_lidar_full/mk29/bag_recordings/recording_20260605_172515

  # 深度相机_断裂
  # default_bag_path: ~/data/rosbags/depth_cam/rosbag2_2026_05_08-17_07_09
  # 深度相机_初始弯
  # default_bag_path: ~/data/rosbags/depth_cam/rosbag2_2026_05_22-10_25_32
  # 深度相机_拐弯
  # default_bag_path: ~/data/rosbags/depth_cam/rosbag2_2026_05_22-10_34_50
  # 深度相机_室内墙
  # default_bag_path: ~/data/rosbags/depth_cam/mk33/bag_recordings/recording_20260610_164928
  # 深度相机_模拟
  # default_bag_path: ~/data/rosbags/depth_cam/local/bag_recordings/recording_20260618_142152
  
  # 避车_调研
  # default_bag_path: ~/data/rosbags/scan_avoid/rosbag2_2026_03_02-17_19_25
  #
  # 多深度相机
  #default_bag_path: ~/data/rosbags/depth_cam/mk30/recording_20260709_144118

  # 默认回放的 topics
  default_topics:
    - /tf
    - /tf_static
    - /intel_realsense_r200_depth/points
    # - /lidar_car_points
    - /rgb_camera_front/compressed
    - /rgb_camera_back/compressed
    - /front_scan
    - /back_scan
    - /rgb_camera_front/camera_info
    - /rgb_camera_back/camera_info
    - /camera1/depth/points
    - /imu/data
    - /camera1/color/image_raw
    - /camera1/depth/image_raw
    - /camera1/depth/camera_info
    - /camera2/color/image_raw
    - /camera2/depth/image_raw
    - /camera2/depth/camera_info
    - /camera4/color/image_raw
    - /camera4/depth/image_raw
    - /camera4/depth/camera_info
      #- /garage_polygons
    # - /vanjee/lidar
  # 是否使用仿真时间
  use_sim_time: true
  # 是否发布 clock
  publish_clock: true
  # 是否循环播放
  loop: true
  # 播放速率 (1.0 = 正常速度)
  rate: 0.5
  # 播放起始时间偏移（秒）
  start_offset: 0.0
  # 启动时是否暂停
  start_paused: true
  # QoS profile 配置文件路径（可选）
  qos_profile_overrides_path: /home/sherlock/codes/utils_ws/src/bn_sim_quickload/bn_sim_quickload/config/qos-profile.yaml

# 相机数据配置
cameras:
  # 默认相机数据模式 (raw/compressed)
  default_mode: compressed
  # 默认帧率 (Hz) - 必须为浮点数
  default_frame_rate: 30
  # 默认图像尺寸
  default_width: 1280
  default_height: 720
  # 默认使用仿真时间
  default_use_sim_time: true
  front:
    # video_path: /home/sherlock/data/videos/cac07407-0eb1c8bf-cut.mp4
    video_path: /home/sherlock/data/videos/cac07407-0eb1c8bf.mov
    raw_topic: /rgb_camera_front/image_raw
    compressed_topic: /rgb_camera_front/compressed
    # 可单独覆盖以下参数，不设置则使用默认值
    # frame_rate: 30
    # width: 1280
    # height: 720
    # use_sim_time: true
  back:
    video_path: /home/sherlock/data/videos/cac07407-0eb1c8bf.mov
    raw_topic: /rgb_camera_back/image_raw
    compressed_topic: /rgb_camera_back/compressed
    # frame_rate: 30
    # width: 1280
    # height: 720
    # use_sim_time: true

# 激光雷达模拟配置
lidar_simulation:
  front:
    config_file: world_to_scan_front.json
    use_sim_time: true
  back:
    config_file: world_to_scan_back.json
    use_sim_time: true
