# 仿真测试环境配置文件
# Simulation test environment configuration

# 环境变量设置
environment:
  CYCLONEDDS_URI: "file:///home/sherlock/codes/vision_ws/src/vehicle_tracker/config/dds.xml"

# 工作空间 source 路径
workspaces:
  ritju_ws: /home/sherlock/codes/ritju_ws/install/setup.bash
  utils_ws: /home/sherlock/codes/utils_ws/install/setup.bash
  nav2_ws: /home/sherlock/codes/nav2_ws/install/setup.bash

# Rosbag 回放配置
rosbag:
  # 默认 bag 文件路径
  default_bag_path: ~/data/rosbags/vision_lidar/rosbag2_2026_04_16-15_35_07
  # 默认回放的 topics
  default_topics:
    - /tf
    - /tf_static
    - /lidar_car_points
    - /rgb_camera_front/compressed
    - /rgb_camera_back/compressed
    - /front_scan
    - /back_scan
  # 是否使用仿真时间
  use_sim_time: true
  # 是否发布 clock
  publish_clock: true
  # 是否循环播放
  loop: true
  # 播放速率 (1.0 = 正常速度)
  rate: 10

# 相机数据配置
cameras:
  # 默认相机数据模式 (raw/compressed)
  default_mode: compressed
  # 默认帧率 (Hz) - 必须为浮点数
  default_frame_rate: 30
  # 默认图像尺寸
  default_width: 1280
  default_height: 720
  # 默认使用仿真时间
  default_use_sim_time: true
  front:
    # video_path: /home/sherlock/data/videos/cac07407-0eb1c8bf-cut.mp4
    video_path: /home/sherlock/data/videos/cac07407-0eb1c8bf.mov
    raw_topic: /rgb_camera_front/image_raw
    compressed_topic: /rgb_camera_front/compressed
    # 可单独覆盖以下参数，不设置则使用默认值
    # frame_rate: 30
    # width: 1280
    # height: 720
    # use_sim_time: true
  back:
    video_path: /home/sherlock/data/videos/cac07407-0eb1c8bf.mov
    raw_topic: /rgb_camera_back/image_raw
    compressed_topic: /rgb_camera_back/compressed
    # frame_rate: 30
    # width: 1280
    # height: 720
    # use_sim_time: true

# 激光雷达模拟配置
lidar_simulation:
  front:
    config_file: world_to_scan_front.json
    use_sim_time: true
  back:
    config_file: world_to_scan_back.json
    use_sim_time: true
